name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # postinstall מריץ prisma generate — נדרש כדי שה-typecheck יכיר את ה-Client.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      # build דורש משתני סביבה מינימליים. DATABASE_URL לא נדרש בזמן build
      # (אין חיבור למסד בזמן הבנייה), אך AUTH_SECRET כן נצרך בכמה מקומות.
      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
          SKIP_ENV_VALIDATION: "true"
